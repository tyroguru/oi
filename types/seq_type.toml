[codegen]
decl = """
template<typename T, typename Allocator>
void getSizeType(const %1%<T, Allocator> &container, size_t& returnArg);
"""

func = """
template<typename T, typename Allocator>
void getSizeType(const %1%<T, Allocator> &container, size_t& returnArg)
{
    SAVE_SIZE(sizeof(%1%<T>));

    SAVE_DATA((uintptr_t)&container);
    SAVE_DATA((uintptr_t)container.capacity());
    SAVE_DATA((uintptr_t)container.size());

    SAVE_SIZE((container.capacity() - container.size()) * sizeof(T));

    // The double ampersand is needed otherwise this loop doesn't work with vector<bool>
    for (auto&& it: container) {
    getSizeType(it, returnArg);
    }
}
"""

traversal_func = """
auto tail = returnArg.delegate([&container](auto intervals) {
  constexpr bool can_export_data_interval = !std::is_same_v<T0, bool>;

  const bool has_data_interval =
      can_export_data_interval && container.capacity() != 0;

  auto contents = intervals.write(has_data_interval ? 2 : 1);

  // Interval 1: the vector object itself.
  contents = contents.delegate([&container](auto interval) {
    return interval
        .write(reinterpret_cast<uintptr_t>(&container))
        .write(sizeof(container));
  });

  // Interval 2: the vector's backing storage, when representable.
  if constexpr (can_export_data_interval) {
    if (has_data_interval) {
      contents = contents.delegate([&container](auto interval) {
        return interval
            .write(reinterpret_cast<uintptr_t>(container.data()))
            .write(container.capacity() * sizeof(T0));
      });
    }
  }

  return contents.finish();
})
.write((uintptr_t)&container)
.write(container.capacity())
.write(container.size());

// The double ampersand is needed otherwise this loop doesn't work with
// vector<bool>
for (auto&& it : container) {
  tail = tail.delegate([&ctx, &it](auto ret) {
    return OIInternal::getSizeType<Ctx>(ctx, it, ret);
  });
}

return tail.finish();
"""

